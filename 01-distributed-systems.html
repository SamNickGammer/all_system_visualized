<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Distributed Systems — Flow Diagrams</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c10;--panel:#0f1318;--border:#1e2530;--accent:#00d4aa;--purple:#7c6af7;--orange:#ff6b35;--yellow:#ffd166;--red:#ff4466;--blue:#4fc3f7;--text:#c8d8e8;--dim:#4a5568}
body{background:var(--bg);font-family:'JetBrains Mono',monospace;color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:20px;z-index:1;position:relative}
.back{font-size:11px;color:var(--dim);text-decoration:none;letter-spacing:.1em;transition:color .15s}.back:hover{color:var(--accent)}
header h1{font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--accent)}
header span{font-size:10px;color:var(--dim)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;z-index:1;position:relative;flex-shrink:0}
.tabs::-webkit-scrollbar{height:2px}.tabs::-webkit-scrollbar-thumb{background:var(--dim)}
.tab{font-size:10px;letter-spacing:.08em;padding:12px 18px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:var(--dim);transition:all .15s;text-transform:uppercase}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.workspace{flex:1;display:flex;flex-direction:column;z-index:1;position:relative}
.diagram-info{padding:20px 32px 0;display:flex;gap:24px;align-items:baseline}
.diagram-info h2{font-size:14px;font-weight:700;color:var(--text)}
.diagram-info p{font-size:10px;color:var(--dim);letter-spacing:.04em}
.controls{padding:12px 32px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border)}
.btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:7px 16px;border:1px solid;cursor:pointer;background:transparent;transition:all .15s}
.btn-p{border-color:var(--accent);color:var(--accent)}.btn-p:hover{background:var(--accent);color:var(--bg)}
.btn-s{border-color:var(--dim);color:var(--dim)}.btn-s:hover{border-color:var(--text);color:var(--text)}
.btn-r{border-color:var(--red);color:var(--red)}.btn-r:hover{background:var(--red);color:var(--bg)}
.canvas{flex:1;padding:32px;min-height:320px;position:relative;overflow:hidden}
.log{height:90px;overflow-y:auto;border-top:1px solid var(--border);padding:10px 32px;font-size:9px;line-height:1.9;color:var(--dim)}
.log::-webkit-scrollbar{width:3px}.log::-webkit-scrollbar-thumb{background:var(--dim)}
.le{display:flex;gap:10px}.le .t{color:var(--dim);min-width:65px}.le.ok .m{color:var(--accent)}.le.warn .m{color:var(--yellow)}.le.err .m{color:var(--red)}.le.info .m{color:var(--blue)}

/* shared node/box styles */
.node{position:absolute;padding:8px 12px;border:1px solid;font-size:10px;text-align:center;transition:all .2s;white-space:nowrap}
.node-green{background:rgba(0,212,170,.07);border-color:rgba(0,212,170,.3);color:var(--accent)}
.node-purple{background:rgba(124,106,247,.07);border-color:rgba(124,106,247,.3);color:var(--purple)}
.node-orange{background:rgba(255,107,53,.07);border-color:rgba(255,107,53,.3);color:var(--orange)}
.node-blue{background:rgba(79,195,247,.07);border-color:rgba(79,195,247,.3);color:var(--blue)}
.node-yellow{background:rgba(255,209,102,.07);border-color:rgba(255,209,102,.3);color:var(--yellow)}
.node-red{background:rgba(255,68,102,.07);border-color:rgba(255,68,102,.3);color:var(--red)}
.node.active{filter:brightness(1.6);box-shadow:0 0 12px currentColor}
.node .sub{font-size:8px;color:var(--dim);margin-top:2px}

.pkt{position:absolute;width:14px;height:14px;border-radius:2px;font-size:7px;display:flex;align-items:center;justify-content:center;font-weight:700;z-index:10;pointer-events:none;transition:none}
</style>
</head>
<body>
<div class="grid-bg"></div>
<header>
  <a href="index.html" class="back">← hub</a>
  <h1>Distributed Systems</h1>
  <span>// 10 animated flow diagrams</span>
</header>
<div class="tabs" id="tabs"></div>
<div class="workspace">
  <div class="diagram-info"><h2 id="dTitle"></h2><p id="dDesc"></p></div>
  <div class="controls">
    <button class="btn btn-p" id="btnPlay">▶ Start</button>
    <button class="btn btn-s" id="btnPause">⏸ Pause</button>
    <button class="btn btn-r" id="btnReset">↺ Reset</button>
  </div>
  <div class="canvas" id="canvas"></div>
  <div class="log" id="log"></div>
</div>

<script>
let current=null, iid=null, running=false;
const logEl=document.getElementById('log');
const canvas=document.getElementById('canvas');

function ts(){const n=new Date();return`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`}
function log(type,msg){const d=document.createElement('div');d.className=`le ${type}`;d.innerHTML=`<span class="t">${ts()}</span><span class="m">${msg}</span>`;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;while(logEl.children.length>40)logEl.removeChild(logEl.firstChild)}
function clearLog(){logEl.innerHTML=''}

function mkNode(x,y,w,label,sub,cls){
  const d=document.createElement('div');
  d.className=`node ${cls}`;
  d.style.cssText=`left:${x}px;top:${y}px;width:${w}px`;
  d.innerHTML=label+(sub?`<div class="sub">${sub}</div>`:'');
  canvas.appendChild(d);return d;
}

function flyPkt(sx,sy,ex,ey,color,label,dur,cb){
  const p=document.createElement('div');
  p.className='pkt';
  p.style.cssText=`left:${sx}px;top:${sy}px;background:${color}22;border:1px solid ${color};color:${color}`;
  p.textContent=label;
  canvas.appendChild(p);
  const start=performance.now();
  function step(now){
    const t=Math.min((now-start)/dur,1);
    const ease=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    p.style.left=(sx+(ex-sx)*ease)+'px';
    p.style.top=(sy+(ey-sy)*ease)+'px';
    if(t<1)requestAnimationFrame(step);
    else{p.remove();if(cb)cb();}
  }
  requestAnimationFrame(step);
}

function arrowSvg(svg,x1,y1,x2,y2,col){
  const g=document.createElementNS('http://www.w3.org/2000/svg','line');
  g.setAttribute('x1',x1);g.setAttribute('y1',y1);g.setAttribute('x2',x2);g.setAttribute('y2',y2);
  g.setAttribute('stroke',col||'#2a3545');g.setAttribute('stroke-width','1');
  g.setAttribute('marker-end','url(#arr)');
  svg.appendChild(g);
}
function mkSvg(){
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none';
  s.innerHTML=`<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#2a3545"/></marker><marker id="arr-g" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#00d4aa"/></marker></defs>`;
  canvas.appendChild(s);return s;
}

// ===================== DIAGRAMS =====================
const diagrams=[
// 0: Load Balancer
{title:'Load Balancer',desc:'Round-robin traffic distribution across a server pool',
init(){
  canvas.innerHTML='';clearLog();
  const svg=mkSvg();
  const lb=mkNode(canvas.offsetWidth/2-60,20,120,'Load Balancer','nginx / HAProxy','node-green');
  const s0=mkNode(80,160,110,'Server 0','req: 0','node-blue');
  const s1=mkNode(canvas.offsetWidth/2-55,160,110,'Server 1','req: 0','node-blue');
  const s2=mkNode(canvas.offsetWidth-190,160,110,'Server 2','req: 0','node-blue');
  const clients=[
    mkNode(20,280,80,'Client A','','node-purple'),
    mkNode(canvas.offsetWidth/2-40,280,80,'Client B','','node-purple'),
    mkNode(canvas.offsetWidth-100,280,80,'Client C','','node-purple'),
  ];
  const servers=[s0,s1,s2];
  const counts=[0,0,0];
  let rr=0;
  this._tick=()=>{
    const ci=Math.floor(Math.random()*3);
    const si=rr%3; rr++;
    servers[si].classList.add('active');
    setTimeout(()=>servers[si].classList.remove('active'),400);
    counts[si]++;
    servers[si].querySelector('.sub').textContent=`req: ${counts[si]}`;
    const lbr=lb.getBoundingClientRect(),cr=canvas.getBoundingClientRect();
    const sx=lbr.left-cr.left+60,sy=lbr.top-cr.top+25;
    const sr=servers[si].getBoundingClientRect();
    const ex=sr.left-cr.left+55,ey=sr.top-cr.top;
    flyPkt(sx,sy,ex,ey,'#4fc3f7','REQ',500,null);
    log('ok',`[LB] Client→Server${si} (round-robin #${rr}) total:${counts[si]}`);
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),900)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 1: CDN
{title:'CDN Request Routing',desc:'User request routing through edge nodes to origin server',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  mkNode(cx/2-40,10,80,'User','browser','node-purple');
  const edges=[
    mkNode(40,120,110,'Edge — SG','Singapore PoP','node-blue'),
    mkNode(cx/2-55,120,110,'Edge — US','New York PoP','node-blue'),
    mkNode(cx-150,120,110,'Edge — EU','Frankfurt PoP','node-blue'),
  ];
  const origin=mkNode(cx/2-55,240,110,'Origin Server','cloud infra','node-orange');
  let step=0;
  const steps=[
    ()=>{const e=edges[0];e.classList.add('active');setTimeout(()=>e.classList.remove('active'),400);log('ok','[CDN] User→Edge-SG: cache MISS')},
    ()=>{origin.classList.add('active');setTimeout(()=>origin.classList.remove('active'),400);log('warn','[CDN] Edge-SG→Origin: fetch content')},
    ()=>{edges[0].classList.add('active');setTimeout(()=>edges[0].classList.remove('active'),400);log('ok','[CDN] Origin→Edge-SG: cached TTL=3600s')},
    ()=>{log('info','[CDN] Next req: Edge-SG cache HIT (0ms)');},
    ()=>{const e=edges[1];e.classList.add('active');setTimeout(()=>e.classList.remove('active'),400);log('ok','[CDN] User→Edge-US: cache HIT')},
    ()=>{const e=edges[2];e.classList.add('active');setTimeout(()=>e.classList.remove('active'),400);log('ok','[CDN] User→Edge-EU: cache HIT')},
  ];
  this._tick=()=>{steps[step%steps.length]();step++};
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),1100)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 2: Kubernetes
{title:'Kubernetes Pod Scheduling',desc:'Scheduler assigns pods to nodes based on available resources',
init(){
  canvas.innerHTML='';clearLog();
  const pod_colors=['node-green','node-blue','node-purple','node-orange'];
  const nodes_data=[
    {label:'Node 0',cpu:'CPU: 2/4',x:20,y:60},
    {label:'Node 1',cpu:'CPU: 1/4',x:220,y:60},
    {label:'Node 2',cpu:'CPU: 3/4',x:420,y:60},
  ];
  mkNode(canvas.offsetWidth/2-60,10,120,'kube-scheduler','control plane','node-yellow');
  const nodeEls=nodes_data.map(n=>mkNode(n.x,n.y,160,n.label,n.cpu,'node-blue'));
  const podCounts=[0,0,0];
  const cpuUsage=[2,1,3];
  this._tick=()=>{
    const si=cpuUsage.indexOf(Math.min(...cpuUsage));
    cpuUsage[si]++;podCounts[si]++;
    nodeEls[si].classList.add('active');
    setTimeout(()=>nodeEls[si].classList.remove('active'),400);
    nodeEls[si].querySelector('.sub').textContent=`CPU: ${cpuUsage[si]}/4 pods:${podCounts[si]}`;
    const apps=['nginx','redis','api-svc','worker','postgres','metrics'];
    const app=apps[Math.floor(Math.random()*apps.length)];
    log('ok',`[Scheduler] pod/${app} → node-${si} (cpu:${cpuUsage[si]}/4)`);
    if(cpuUsage[si]>=4){cpuUsage[si]=0;log('warn',`[Node-${si}] evicting old pod (CPU limit)`)}
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),900)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 3: DB Replication
{title:'Database Replication',desc:'Primary writes propagate to replicas with replication lag',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  const primary=mkNode(cx/2-60,20,120,'Primary DB','writes: 0','node-green');
  const replicas=[
    mkNode(60,160,130,'Replica 0','lag: 0ms','node-blue'),
    mkNode(cx/2-65,160,130,'Replica 1','lag: 0ms','node-blue'),
    mkNode(cx-190,160,130,'Replica 2','lag: 0ms','node-blue'),
  ];
  let writes=0;const lags=[0,0,0];
  this._tick=()=>{
    writes++;
    primary.querySelector('.sub').textContent=`writes: ${writes}`;
    primary.classList.add('active');setTimeout(()=>primary.classList.remove('active'),300);
    replicas.forEach((r,i)=>{
      const delay=50+Math.floor(Math.random()*200);
      lags[i]=delay;
      setTimeout(()=>{
        r.classList.add('active');setTimeout(()=>r.classList.remove('active'),300);
        r.querySelector('.sub').textContent=`lag: ${delay}ms`;
        log('ok',`[Replica-${i}] WAL applied offset:${writes} lag:${delay}ms`);
      },delay);
    });
    log('info',`[Primary] COMMIT write #${writes}`);
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),1100)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 4: Microservices
{title:'Microservices / API Gateway',desc:'API gateway fans out requests to downstream services',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  mkNode(40,130,100,'Client','mobile/web','node-purple');
  const gw=mkNode(220,130,120,'API Gateway','auth + route','node-green');
  const svcs=[
    mkNode(cx-200,40,130,'Order Service','REST','node-blue'),
    mkNode(cx-200,110,130,'Payment Svc','gRPC','node-orange'),
    mkNode(cx-200,180,130,'Inventory Svc','REST','node-yellow'),
    mkNode(cx-200,250,130,'Notify Svc','async','node-purple'),
  ];
  const svcNames=['order-svc','payment-svc','inventory-svc','notify-svc'];
  this._tick=()=>{
    const i=Math.floor(Math.random()*4);
    gw.classList.add('active');setTimeout(()=>gw.classList.remove('active'),300);
    svcs[i].classList.add('active');setTimeout(()=>svcs[i].classList.remove('active'),400);
    const codes=['200 OK','200 OK','200 OK','201 CREATED','400 ERR'];
    const code=codes[Math.floor(Math.random()*codes.length)];
    log(code.includes('ERR')?'err':'ok',`[Gateway] → ${svcNames[i]} → ${code}`);
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),800)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 5: CI/CD Pipeline
{title:'CI/CD Pipeline',desc:'Code commit flows through build, test, and deploy stages',
init(){
  canvas.innerHTML='';clearLog();
  const stages=[
    {l:'Commit',s:'git push',c:'node-purple'},
    {l:'Build',s:'docker build',c:'node-blue'},
    {l:'Test',s:'jest + e2e',c:'node-yellow'},
    {l:'Scan',s:'snyk / sonar',c:'node-orange'},
    {l:'Deploy',s:'k8s rollout',c:'node-green'},
  ];
  const gap=Math.floor((canvas.offsetWidth-40)/stages.length);
  const els=stages.map((s,i)=>mkNode(20+i*gap,100,gap-20,s.l,s.s,s.c));
  let cur=0;
  this._tick=()=>{
    els.forEach(e=>e.classList.remove('active'));
    els[cur].classList.add('active');
    const msgs=[
      `[Git] new commit on main branch`,
      `[CI] building image sha:${Math.random().toString(16).slice(2,10)}`,
      `[Test] 342 passed, 0 failed`,
      `[Scan] no critical CVEs found`,
      `[CD] rolling update → production ✓`,
    ];
    const types=['info','ok','ok','ok','ok'];
    log(types[cur],msgs[cur]);
    cur=(cur+1)%stages.length;
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),1000)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 6: Kafka (mini)
{title:'Kafka Topic Flow',desc:'Producers, partitioned topic, consumer groups — see dedicated file',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  const producers=[mkNode(30,60,110,'order-svc','producer','node-green'),mkNode(30,150,110,'payment-svc','producer','node-green'),mkNode(30,240,110,'inventory-svc','producer','node-green')];
  const partitions=[mkNode(cx/2-70,40,140,'Partition 0','offset:0','node-purple'),mkNode(cx/2-70,130,140,'Partition 1','offset:0','node-purple'),mkNode(cx/2-70,220,140,'Partition 2','offset:0','node-purple')];
  const consumers=[mkNode(cx-150,60,130,'analytics','consumer','node-orange'),mkNode(cx-150,150,130,'notify-svc','consumer','node-orange'),mkNode(cx-150,240,130,'audit-svc','consumer','node-orange')];
  let offsets=[0,0,0],msgs=['ORD','PAY','STK'];
  this._tick=()=>{
    const pi=Math.floor(Math.random()*3),pro=Math.floor(Math.random()*3);
    offsets[pi]++;
    producers[pro].classList.add('active');setTimeout(()=>producers[pro].classList.remove('active'),300);
    partitions[pi].classList.add('active');setTimeout(()=>partitions[pi].classList.remove('active'),300);
    partitions[pi].querySelector('.sub').textContent=`offset:${offsets[pi]}`;
    if(Math.random()>.4){consumers[pi].classList.add('active');setTimeout(()=>consumers[pi].classList.remove('active'),300);}
    log('ok',`[P${pro}→Part${pi}] ${msgs[pro]} off:${offsets[pi]}`);
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),700)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 7: Event Sourcing / CQRS
{title:'Event Sourcing / CQRS',desc:'Commands produce events → append to event store → project to read models',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  const cmd=mkNode(30,60,110,'Command','CreateOrder','node-purple');
  const handler=mkNode(180,60,120,'Command Handler','validate+exec','node-blue');
  const store=mkNode(cx/2-60,60,130,'Event Store','append-only log','node-orange');
  const bus=mkNode(cx/2-60,170,130,'Event Bus','publish events','node-yellow');
  const readModel=mkNode(cx-170,110,140,'Read Model','materialized view','node-green');
  const queryApi=mkNode(cx-170,220,140,'Query API','GET /orders','node-green');
  let offset=0;
  const events=['OrderCreated','PaymentReceived','ItemShipped','OrderCancelled','RefundIssued'];
  const steps=[
    ()=>{cmd.classList.add('active');handler.classList.add('active');setTimeout(()=>{cmd.classList.remove('active');handler.classList.remove('active')},400);log('info','[Command] CreateOrder cmd received, validating...')},
    ()=>{store.classList.add('active');setTimeout(()=>store.classList.remove('active'),400);offset++;const evt=events[Math.floor(Math.random()*events.length)];log('info',`[EventStore] ${evt} appended offset:${offset}`)},
    ()=>{bus.classList.add('active');setTimeout(()=>bus.classList.remove('active'),400);log('info','[EventBus] publishing event to subscribers')},
    ()=>{readModel.classList.add('active');setTimeout(()=>readModel.classList.remove('active'),400);log('ok','[ReadModel] projection updated — order count++')},
    ()=>{queryApi.classList.add('active');setTimeout(()=>queryApi.classList.remove('active'),400);log('ok','[Query] GET /orders → 200 OK (eventually consistent)')},
  ];
  let si=0;
  this._tick=()=>{steps[si%steps.length]();si++};
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),1000)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 8: Circuit Breaker
{title:'Circuit Breaker Pattern',desc:'CLOSED → OPEN → HALF-OPEN state machine protecting against cascading failures',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  const client=mkNode(30,130,100,'Client','requests','node-purple');
  const breaker=mkNode(cx/2-70,130,140,'Circuit Breaker','state: CLOSED','node-green');
  const service=mkNode(cx-160,130,120,'Downstream Svc','external API','node-blue');
  // State indicators
  const closed=mkNode(cx/4-40,260,80,'CLOSED','normal','node-green');
  const open=mkNode(cx/2-40,260,80,'OPEN','blocking','node-red');
  const half=mkNode(cx*3/4-40,260,80,'HALF-OPEN','probing','node-yellow');
  let failures=0,successes=0,state='CLOSED',reqCount=0;
  const threshold=4;
  this._tick=()=>{
    reqCount++;
    client.classList.add('active');setTimeout(()=>client.classList.remove('active'),300);
    closed.classList.remove('active');open.classList.remove('active');half.classList.remove('active');
    if(state==='CLOSED'){
      closed.classList.add('active');
      const fail=Math.random()>.6;
      if(fail){failures++;service.classList.add('active');setTimeout(()=>service.classList.remove('active'),300);
        log('err',`[CB] request #${reqCount} FAILED (${failures}/${threshold} failures)`);
        if(failures>=threshold){state='OPEN';breaker.querySelector('.sub').textContent='state: OPEN';breaker.className='node node-red';
          log('err','[CB] threshold reached → state: OPEN (blocking requests)')}}
      else{successes++;service.classList.add('active');setTimeout(()=>service.classList.remove('active'),300);
        log('ok',`[CB] request #${reqCount} succeeded (failures:${failures})`)}
    } else if(state==='OPEN'){
      open.classList.add('active');
      log('warn',`[CB] request #${reqCount} BLOCKED — circuit is OPEN`);
      if(Math.random()>.6){state='HALF-OPEN';breaker.querySelector('.sub').textContent='state: HALF-OPEN';breaker.className='node node-yellow';
        log('warn','[CB] timeout elapsed → state: HALF-OPEN (allowing probe)')}
    } else {
      half.classList.add('active');
      const probeOk=Math.random()>.4;
      if(probeOk){state='CLOSED';failures=0;breaker.querySelector('.sub').textContent='state: CLOSED';breaker.className='node node-green';
        service.classList.add('active');setTimeout(()=>service.classList.remove('active'),300);
        log('ok','[CB] probe succeeded → state: CLOSED ✓')}
      else{state='OPEN';breaker.querySelector('.sub').textContent='state: OPEN';breaker.className='node node-red';
        log('err','[CB] probe failed → state: OPEN again')}
    }
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),900)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 9: Saga Pattern (Orchestration)
{title:'Saga Pattern',desc:'Orchestrator coordinates distributed transactions with compensation on failure',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  const orch=mkNode(cx/2-60,140,120,'Orchestrator','saga coordinator','node-yellow');
  const svcs=[
    mkNode(cx/2-60,20,120,'Order Service','step 1','node-blue'),
    mkNode(cx-160,80,120,'Payment Service','step 2','node-green'),
    mkNode(cx-160,200,120,'Inventory Service','step 3','node-purple'),
    mkNode(cx/2-60,270,120,'Shipping Service','step 4','node-orange'),
  ];
  const svcNames=['Order','Payment','Inventory','Shipping'];
  let sagaId=0,step=0,compensating=false,compStep=0;
  this._tick=()=>{
    svcs.forEach(s=>s.classList.remove('active'));orch.classList.remove('active');
    if(!compensating){
      if(step===0){sagaId++;orch.classList.add('active');log('info',`[Saga #${sagaId}] starting new saga`);}
      else if(step<=4){
        const si=step-1;
        orch.classList.add('active');svcs[si].classList.add('active');
        const fail=step===3&&Math.random()>.65;
        if(fail){
          log('err',`[${svcNames[si]}] FAILED — insufficient stock`);
          compensating=true;compStep=si-1;
          log('warn',`[Saga #${sagaId}] initiating compensation rollback`);
        } else {
          log('ok',`[${svcNames[si]}] step ${step}/4 completed ✓`);
        }
      } else {
        orch.classList.add('active');
        log('ok',`[Saga #${sagaId}] all steps completed ✓ transaction committed`);
        step=-1;
      }
      step++;
    } else {
      if(compStep>=0){
        orch.classList.add('active');svcs[compStep].classList.add('active');
        log('warn',`[${svcNames[compStep]}] compensating → undo step ${compStep+1}`);
        compStep--;
      } else {
        orch.classList.add('active');
        log('err',`[Saga #${sagaId}] fully rolled back — saga aborted`);
        compensating=false;step=0;
      }
    }
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),1000)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},
];

// Setup tabs
const tabsEl=document.getElementById('tabs');
diagrams.forEach((d,i)=>{
  const t=document.createElement('div');t.className='tab';t.textContent=d.title;
  t.onclick=()=>show(i);tabsEl.appendChild(t);
});

function show(i){
  if(current!==null){diagrams[current].pause&&diagrams[current].pause();}
  running=false;clearInterval(iid);
  current=i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.getElementById('dTitle').textContent=diagrams[i].title;
  document.getElementById('dDesc').textContent=diagrams[i].desc;
  diagrams[i].init();
}

document.getElementById('btnPlay').onclick=()=>{if(current!==null&&!running){diagrams[current].start();running=true;}};
document.getElementById('btnPause').onclick=()=>{if(current!==null){diagrams[current].pause();running=false;}};
document.getElementById('btnReset').onclick=()=>{if(current!==null){diagrams[current].reset();running=false;}};

show(0);
