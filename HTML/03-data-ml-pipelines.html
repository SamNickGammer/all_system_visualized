<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data & ML Pipelines — Flow Diagrams</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0c10;--panel:#0f1318;--border:#1e2530;--accent:#00d4aa;--purple:#7c6af7;--orange:#ff6b35;--yellow:#ffd166;--red:#ff4466;--blue:#4fc3f7;--text:#c8d8e8;--dim:#4a5568}
body{background:var(--bg);font-family:'JetBrains Mono',monospace;color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(124,106,247,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,247,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:20px;z-index:1;position:relative}
.back{font-size:11px;color:var(--dim);text-decoration:none;letter-spacing:.1em;transition:color .15s}.back:hover{color:var(--purple)}
header h1{font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--purple)}
header span{font-size:10px;color:var(--dim)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;z-index:1;position:relative;flex-shrink:0}
.tab{font-size:10px;letter-spacing:.08em;padding:12px 18px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;color:var(--dim);transition:all .15s;text-transform:uppercase}
.tab:hover{color:var(--text)}.tab.active{color:var(--purple);border-bottom-color:var(--purple)}
.workspace{flex:1;display:flex;flex-direction:column;z-index:1;position:relative}
.diagram-info{padding:20px 32px 0;display:flex;gap:24px;align-items:baseline}
.diagram-info h2{font-size:14px;font-weight:700;color:var(--text)}
.diagram-info p{font-size:10px;color:var(--dim);letter-spacing:.04em}
.controls{padding:12px 32px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border)}
.btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:7px 16px;border:1px solid;cursor:pointer;background:transparent;transition:all .15s}
.btn-p{border-color:var(--purple);color:var(--purple)}.btn-p:hover{background:var(--purple);color:var(--bg)}
.btn-s{border-color:var(--dim);color:var(--dim)}.btn-s:hover{border-color:var(--text);color:var(--text)}
.btn-r{border-color:var(--red);color:var(--red)}.btn-r:hover{background:var(--red);color:var(--bg)}
.canvas{flex:1;padding:32px;min-height:320px;position:relative;overflow:hidden}
.log{height:90px;overflow-y:auto;border-top:1px solid var(--border);padding:10px 32px;font-size:9px;line-height:1.9;color:var(--dim)}
.log::-webkit-scrollbar{width:3px}.log::-webkit-scrollbar-thumb{background:var(--dim)}
.log-resize{height:7px;cursor:ns-resize;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;z-index:2;position:relative}.log-resize:hover,.log-resize.dragging{background:rgba(124,106,247,.1)}.log-resize::after{content:'';width:36px;height:2px;border-radius:1px;background:var(--dim);opacity:.35;transition:opacity .15s}.log-resize:hover::after,.log-resize.dragging::after{opacity:.9}
.le{display:flex;gap:10px}.le .t{color:var(--dim);min-width:65px}.le.ok .m{color:var(--accent)}.le.warn .m{color:var(--yellow)}.le.err .m{color:var(--red)}.le.info .m{color:var(--purple)}
.node{position:absolute;padding:8px 12px;border:1px solid;font-size:10px;text-align:center;transition:all .25s;white-space:nowrap}
.node-green{background:rgba(0,212,170,.07);border-color:rgba(0,212,170,.3);color:var(--accent)}
.node-purple{background:rgba(124,106,247,.07);border-color:rgba(124,106,247,.3);color:var(--purple)}
.node-orange{background:rgba(255,107,53,.07);border-color:rgba(255,107,53,.3);color:var(--orange)}
.node-blue{background:rgba(79,195,247,.07);border-color:rgba(79,195,247,.3);color:var(--blue)}
.node-yellow{background:rgba(255,209,102,.07);border-color:rgba(255,209,102,.3);color:var(--yellow)}
.node-red{background:rgba(255,68,102,.07);border-color:rgba(255,68,102,.3);color:var(--red)}
.node.active{filter:brightness(1.6);box-shadow:0 0 12px currentColor}
.node .sub{font-size:8px;color:var(--dim);margin-top:2px}
/* ML specific */
.loss-chart{position:absolute;bottom:60px;right:20px;width:160px;height:80px;border:1px solid var(--border);background:rgba(124,106,247,.03)}
.loss-chart canvas{display:block}
</style>
</head>
<body>
<div class="grid-bg"></div>
<header>
  <a href="index.html" class="back">← hub</a>
  <h1>Data &amp; ML Pipelines</h1>
  <span>// 8 animated flow diagrams</span>
</header>
<div class="tabs" id="tabs"></div>
<div class="workspace">
  <div class="diagram-info"><h2 id="dTitle"></h2><p id="dDesc"></p></div>
  <div class="controls">
    <button class="btn btn-p" id="btnPlay">▶ Start</button>
    <button class="btn btn-s" id="btnPause">⏸ Pause</button>
    <button class="btn btn-r" id="btnReset">↺ Reset</button>
  </div>
  <div class="canvas" id="canvas"></div>
  <div class="log-resize" id="logResize"></div>
  <div class="log" id="log"></div>
</div>
<script>
let current=null,iid=null,running=false;
const logEl=document.getElementById('log'),canvas=document.getElementById('canvas');
function ts(){const n=new Date();return`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`}
function log(type,msg){const d=document.createElement('div');d.className=`le ${type}`;d.innerHTML=`<span class="t">${ts()}</span><span class="m">${msg}</span>`;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;while(logEl.children.length>40)logEl.removeChild(logEl.firstChild)}
function clearLog(){logEl.innerHTML=''}
function mkNode(x,y,w,label,sub,cls){const d=document.createElement('div');d.className=`node ${cls}`;d.style.cssText=`left:${x}px;top:${y}px;width:${w}px`;d.innerHTML=label+(sub?`<div class="sub">${sub}</div>`:'');canvas.appendChild(d);return d}

const diagrams=[
// 0: ETL
{title:'ETL Pipeline',desc:'Extract → Transform → Load with row counters and error handling',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  const gap=Math.floor((cx-40)/5);
  const sources=mkNode(20,80,gap-10,'Sources','postgres/s3/api','node-blue');
  const extract=mkNode(20+gap,80,gap-10,'Extract','read raw','node-purple');
  const transform=mkNode(20+gap*2,80,gap-10,'Transform','clean+join','node-yellow');
  const validate=mkNode(20+gap*3,80,gap-10,'Validate','schema check','node-orange');
  const load=mkNode(20+gap*4,80,gap-10,'Load','data warehouse','node-green');
  const stats={rows:0,errs:0,loaded:0};
  const statEl=document.createElement('div');statEl.style.cssText='position:absolute;bottom:20px;left:20px;font-size:9px;color:var(--dim);line-height:2';canvas.appendChild(statEl);
  const updateStats=()=>{statEl.innerHTML=`rows_extracted: <span style="color:var(--blue)">${stats.rows}</span><br>errors: <span style="color:var(--red)">${stats.errs}</span><br>rows_loaded: <span style="color:var(--accent)">${stats.loaded}</span>`};
  updateStats();
  const stages=[sources,extract,transform,validate,load];
  let si=0;
  this._tick=()=>{
    stages.forEach(s=>s.classList.remove('active'));
    stages[si].classList.add('active');
    const batch=Math.floor(Math.random()*500+200);
    if(si===0){stats.rows+=batch;log('info',`[Extract] reading batch ${batch} rows from sources`)}
    else if(si===1){log('info',`[Transform] normalize, dedupe, join lookups`)}
    else if(si===2){const e=Math.floor(Math.random()*5);stats.errs+=e;log(e>2?'warn':'info',`[Validate] schema check: ${batch-e} ok, ${e} rejected`)}
    else if(si===3){log('info',`[Validate] type coercion, null checks passed`)}
    else{stats.loaded+=batch;log('ok',`[Load] ✓ ${batch} rows committed to warehouse`)}
    updateStats();si=(si+1)%stages.length;
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),900)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 1: Spark Streaming
{title:'Spark Data Stream',desc:'Partitioned RDD transformations across worker nodes',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  mkNode(cx/2-60,10,120,'Kafka Source','input stream','node-orange');
  mkNode(cx/2-60,80,120,'Spark Master','coordinator','node-yellow');
  const workers=[
    mkNode(40,170,120,'Worker 0','partition 0-3','node-blue'),
    mkNode(cx/2-60,170,120,'Worker 1','partition 4-7','node-blue'),
    mkNode(cx-160,170,120,'Worker 2','partition 8-11','node-blue'),
  ];
  mkNode(cx/2-60,270,120,'Output Sink','iceberg/delta','node-green');
  let total=0;
  this._tick=()=>{
    const wi=Math.floor(Math.random()*3);
    workers[wi].classList.add('active');setTimeout(()=>workers[wi].classList.remove('active'),300);
    const rows=Math.floor(Math.random()*1000+500);total+=rows;
    const ops=['filter','map','reduceByKey','join','flatMap'];
    const op=ops[Math.floor(Math.random()*ops.length)];
    log('info',`[Worker-${wi}] ${op}(RDD) → ${rows} rows processed total:${total}`);
    if(Math.random()>.7)log('ok',`[Sink] micro-batch committed ${rows} rows`);
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),800)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 2: ML Training Loop
{title:'ML Training Loop',desc:'Forward pass → loss → backprop → weight update cycle',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  const dataNode=mkNode(30,130,110,'Data Loader','batch_size=32','node-blue');
  const model=mkNode(cx/2-70,60,140,'Model (Forward)','inference pass','node-purple');
  const lossNode=mkNode(cx/2-70,180,140,'Loss Function','cross-entropy','node-orange');
  const backprop=mkNode(cx-170,130,140,'Backprop','grad compute','node-yellow');
  const optim=mkNode(cx/2-70,270,140,'Optimizer','Adam lr=3e-4','node-green');
  let epoch=0,step=0;let loss=2.4;const lossHistory=[];
  // mini loss chart
  const chartDiv=document.createElement('div');chartDiv.style.cssText='position:absolute;top:10px;right:10px;width:140px;height:60px;border:1px solid var(--border)';
  const chartCanvas=document.createElement('canvas');chartCanvas.width=140;chartCanvas.height=60;chartDiv.appendChild(chartCanvas);canvas.appendChild(chartDiv);
  const drawLoss=()=>{const ctx=chartCanvas.getContext('2d');ctx.clearRect(0,0,140,60);ctx.fillStyle='rgba(124,106,247,.03)';ctx.fillRect(0,0,140,60);if(lossHistory.length<2)return;ctx.beginPath();ctx.strokeStyle='#7c6af7';ctx.lineWidth=1.5;const mn=Math.min(...lossHistory),mx=Math.max(...lossHistory);const range=mx-mn||1;lossHistory.slice(-40).forEach((v,i,arr)=>{const x=i/(arr.length-1)*138+1,y=60-(v-mn)/range*54-3;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke()};
  const stages=[model,lossNode,backprop,optim];let si=0;
  this._tick=()=>{
    stages.forEach(s=>s.classList.remove('active'));stages[si].classList.add('active');
    step++;
    if(si===0){dataNode.classList.add('active');setTimeout(()=>dataNode.classList.remove('active'),300);log('info',`[Forward] epoch:${epoch} step:${step} batch→model`)}
    else if(si===1){loss=Math.max(0.05,loss-Math.random()*.08+.01);lossHistory.push(loss);drawLoss();log('info',`[Loss] value=${loss.toFixed(4)}`)}
    else if(si===2){log('info',`[Backprop] computing gradients through layers`)}
    else{if(step%20===0)epoch++;log('ok',`[Optim] weights updated step:${step} loss:${loss.toFixed(4)}`)}
    si=(si+1)%stages.length;
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),800)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 3: RAG Pipeline
{title:'RAG Pipeline',desc:'Retrieval Augmented Generation — query → embed → retrieve → generate',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  const user=mkNode(30,120,90,'User Query','natural lang','node-purple');
  const embed=mkNode(180,120,120,'Embedder','text→vector','node-blue');
  const vdb=mkNode(cx/2-60,60,130,'Vector DB','FAISS/Pinecone','node-yellow');
  const context=mkNode(cx/2-60,180,130,'Context','top-k chunks','node-orange');
  const llm=mkNode(cx-170,120,140,'LLM (Claude)','generate answer','node-green');
  const out=mkNode(cx-170,230,140,'Response','to user','node-green');
  const stages=[
    ()=>{user.classList.add('active');setTimeout(()=>user.classList.remove('active'),300);embed.classList.add('active');setTimeout(()=>embed.classList.remove('active'),300);log('info','[Query] "What is the refund policy?" → embedding')},
    ()=>{vdb.classList.add('active');setTimeout(()=>vdb.classList.remove('active'),300);const sim=(0.7+Math.random()*.25).toFixed(3);log('info',`[VDB] ANN search top-5 chunks sim=${sim}`)},
    ()=>{context.classList.add('active');setTimeout(()=>context.classList.remove('active'),300);log('info','[Context] assembled 2.1k tokens from retrieved chunks')},
    ()=>{llm.classList.add('active');setTimeout(()=>llm.classList.remove('active'),400);log('info','[LLM] generating with context window (4k tokens)')},
    ()=>{out.classList.add('active');setTimeout(()=>out.classList.remove('active'),300);log('ok','[Response] ✓ grounded answer returned to user')},
  ];
  let si=0;
  this._tick=()=>{steps=>stages[si%stages.length]();stages[si%stages.length]();si++};
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),1100)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 4: Feature Store
{title:'Feature Store',desc:'Offline ingestion → feature computation → online serving',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  const sources=mkNode(30,130,110,'Data Sources','events/logs/db','node-blue');
  const offline=mkNode(cx/4,60,130,'Offline Store','Spark jobs','node-purple');
  const compute=mkNode(cx/4,200,130,'Feature Engine','transformations','node-yellow');
  const online=mkNode(cx/2+20,130,130,'Online Store','Redis cache','node-green');
  const serving=mkNode(cx-170,130,140,'Feature Serving','low-latency API','node-orange');
  const model=mkNode(cx-170,250,140,'ML Model','inference','node-purple');
  let featureCount=0;
  const features=['user_age_days','purchase_count_7d','avg_order_value','category_affinity','churn_score','click_rate_24h'];
  this._tick=()=>{
    const f=features[Math.floor(Math.random()*features.length)];
    const which=Math.random();
    if(which<.4){offline.classList.add('active');setTimeout(()=>offline.classList.remove('active'),300);featureCount++;log('info',`[Offline] computed ${f} for 1.2M users`)}
    else if(which<.7){online.classList.add('active');setTimeout(()=>online.classList.remove('active'),300);log('info',`[Online] materialized ${f} → Redis TTL:3600`)}
    else{serving.classList.add('active');model.classList.add('active');setTimeout(()=>{serving.classList.remove('active');model.classList.remove('active')},400);const lat=Math.floor(Math.random()*3+1);log('ok',`[Serving] user_id:${Math.floor(Math.random()*9999)} fetched ${Math.floor(Math.random()*8+4)} features in ${lat}ms`)}
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),850)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 5: Data Lake Medallion Architecture
{title:'Medallion Architecture',desc:'Bronze (raw) → Silver (cleaned) → Gold (aggregated) data lake tiers',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  const gap=Math.floor((cx-40)/4);
  const sources=mkNode(20,100,gap-10,'Raw Sources','kafka/s3/api','node-blue');
  const bronze=mkNode(20+gap,100,gap-10,'Bronze','raw ingestion','node-orange');
  const silver=mkNode(20+gap*2,100,gap-10,'Silver','cleaned/validated','node-yellow');
  const gold=mkNode(20+gap*3,100,gap-10,'Gold','business-ready','node-green');
  const stages=[sources,bronze,silver,gold];
  let si=0;const counts={bronze:0,silver:0,gold:0};
  const statEl=document.createElement('div');statEl.style.cssText='position:absolute;bottom:20px;left:20px;font-size:9px;line-height:2';canvas.appendChild(statEl);
  const upd=()=>{statEl.innerHTML=`bronze: <span style="color:var(--orange)">${counts.bronze}k</span>  silver: <span style="color:var(--yellow)">${counts.silver}k</span>  gold: <span style="color:var(--accent)">${counts.gold}k</span>`};
  upd();
  this._tick=()=>{
    stages.forEach(s=>s.classList.remove('active'));stages[si].classList.add('active');
    const batch=Math.floor(Math.random()*50+10);
    if(si===0)log('info',`[Sources] ${batch}k events from kafka + S3 logs`);
    else if(si===1){counts.bronze+=batch;log('info',`[Bronze] ingested ${batch}k raw events (schema-on-read)`)}
    else if(si===2){const reject=Math.floor(Math.random()*3);counts.silver+=batch-reject;log('info',`[Silver] deduplicated + validated → ${batch-reject}k rows (${reject}k rejected)`)}
    else{counts.gold+=Math.floor(batch/3);log('ok',`[Gold] aggregated metrics materialized for dashboards ✓`)}
    upd();si=(si+1)%stages.length;
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),900)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 6: Vector DB Similarity Search
{title:'Vector DB Search',desc:'Query → embed → ANN search → re-rank → results',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;
  const query=mkNode(20,120,90,'Query Text','natural lang','node-purple');
  const embed=mkNode(140,120,110,'Embedder','text→vec','node-blue');
  const vdb=mkNode(cx/2-50,60,110,'Vector DB','1M vectors','node-yellow');
  const topk=mkNode(cx/2-50,190,110,'Top-K','candidates','node-orange');
  const rerank=mkNode(cx-250,120,120,'Re-ranker','cross-encoder','node-purple');
  const results=mkNode(cx-120,120,100,'Results','top 3','node-green');
  const steps=[
    ()=>{query.classList.add('active');embed.classList.add('active');setTimeout(()=>{query.classList.remove('active');embed.classList.remove('active')},400);log('info','[Embed] "How to reset password?" → vector dim:1536')},
    ()=>{vdb.classList.add('active');setTimeout(()=>vdb.classList.remove('active'),400);const scanned=Math.floor(Math.random()*500+500);log('info',`[ANN] HNSW search scanned ${scanned} candidates from 1M vectors`)},
    ()=>{topk.classList.add('active');setTimeout(()=>topk.classList.remove('active'),400);const sim=(0.7+Math.random()*.25).toFixed(3);log('info',`[Top-K] 10 candidates, best similarity: ${sim}`)},
    ()=>{rerank.classList.add('active');setTimeout(()=>rerank.classList.remove('active'),400);log('info','[Rerank] cross-encoder scoring 10 candidates')},
    ()=>{results.classList.add('active');setTimeout(()=>results.classList.remove('active'),400);const lat=Math.floor(Math.random()*20+5);log('ok',`[Results] top 3 returned in ${lat}ms ✓`)},
  ];
  let si=0;
  this._tick=()=>{steps[si%steps.length]();si++};
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),1000)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},

// 7: Model Serving (Batch vs Real-time)
{title:'Model Serving',desc:'Side-by-side: batch inference (Spark) vs real-time inference (API)',
init(){
  canvas.innerHTML='';clearLog();
  const cx=canvas.offsetWidth;const half=cx/2-20;
  const lbl1=document.createElement('div');lbl1.style.cssText='position:absolute;left:20px;top:5px;font-size:9px;color:var(--blue);letter-spacing:.12em;text-transform:uppercase';lbl1.textContent='Batch Inference';canvas.appendChild(lbl1);
  const lbl2=document.createElement('div');lbl2.style.cssText=`position:absolute;left:${half+30}px;top:5px;font-size:9px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase`;lbl2.textContent='Real-time Inference';canvas.appendChild(lbl2);
  const div=document.createElement('div');div.style.cssText=`position:absolute;left:${half+10}px;top:0;bottom:0;width:1px;background:var(--border)`;canvas.appendChild(div);
  const batchSrc=mkNode(20,60,half/2-10,'Data Lake','100k records','node-blue');
  const batchJob=mkNode(20+half/2,60,half/2-10,'Spark Job','batch predict','node-yellow');
  const batchOut=mkNode(20,150,half-10,'Predictions Table','dashboard ready','node-green');
  const rtReq=mkNode(half+20,60,half/2-10,'API Request','POST /predict','node-purple');
  const rtModel=mkNode(half+20+half/2,60,half/2-10,'Model Server','TF Serving','node-orange');
  const rtResp=mkNode(half+20,150,half-10,'Response','{score: 0.87}','node-green');
  let tick=0;
  this._tick=()=>{
    tick++;
    // Batch side
    if(tick%2===0){
      batchSrc.classList.add('active');batchJob.classList.add('active');setTimeout(()=>{batchSrc.classList.remove('active');batchJob.classList.remove('active')},300);
      const rows=Math.floor(Math.random()*50+20);log('info',`[Batch] processing ${rows}k records ETA:${Math.floor(Math.random()*5+2)}min`);
      if(tick%4===0){batchOut.classList.add('active');setTimeout(()=>batchOut.classList.remove('active'),300);log('ok','[Batch] predictions written to table ✓')}
    }
    // RT side
    rtReq.classList.add('active');rtModel.classList.add('active');setTimeout(()=>{rtReq.classList.remove('active');rtModel.classList.remove('active')},200);
    const lat=Math.floor(Math.random()*15+5);const score=(Math.random()*.5+.5).toFixed(2);
    rtResp.classList.add('active');setTimeout(()=>rtResp.classList.remove('active'),200);
    log('ok',`[Realtime] inference lat:${lat}ms → {score: ${score}}`);
  };
},
start(){running=true;iid=setInterval(()=>this._tick&&this._tick(),900)},
pause(){clearInterval(iid);running=false},
reset(){clearInterval(iid);running=false;this.init()}},
];

const tabsEl=document.getElementById('tabs');
diagrams.forEach((d,i)=>{const t=document.createElement('div');t.className='tab';t.textContent=d.title;t.onclick=()=>show(i);tabsEl.appendChild(t)});
function show(i){if(current!==null)diagrams[current].pause&&diagrams[current].pause();running=false;clearInterval(iid);current=i;document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));document.getElementById('dTitle').textContent=diagrams[i].title;document.getElementById('dDesc').textContent=diagrams[i].desc;diagrams[i].init()}
document.getElementById('btnPlay').onclick=()=>{if(current!==null&&!running){diagrams[current].start();running=true;}};
document.getElementById('btnPause').onclick=()=>{if(current!==null){diagrams[current].pause();running=false;}};
document.getElementById('btnReset').onclick=()=>{if(current!==null){diagrams[current].reset();running=false;}};
// Resizable log panel
(function(){
  const h=document.getElementById('logResize'),l=document.getElementById('log');
  let d=false,sy=0,sh=0;
  h.addEventListener('mousedown',function(e){d=true;sy=e.clientY;sh=l.offsetHeight;h.classList.add('dragging');document.body.style.cursor='ns-resize';document.body.style.userSelect='none';e.preventDefault()});
  document.addEventListener('mousemove',function(e){if(!d)return;l.style.height=Math.max(40,Math.min(window.innerHeight*.6,sh+(sy-e.clientY)))+'px'});
  document.addEventListener('mouseup',function(){if(!d)return;d=false;h.classList.remove('dragging');document.body.style.cursor='';document.body.style.userSelect=''});
  h.addEventListener('touchstart',function(e){d=true;sy=e.touches[0].clientY;sh=l.offsetHeight;h.classList.add('dragging');e.preventDefault()},{passive:false});
  document.addEventListener('touchmove',function(e){if(!d)return;l.style.height=Math.max(40,Math.min(window.innerHeight*.6,sh+(sy-e.touches[0].clientY)))+'px'});
  document.addEventListener('touchend',function(){if(!d)return;d=false;h.classList.remove('dragging')});
})();

show(0);
</script>
</body>
</html>
